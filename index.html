    // ═══════════════════════════════════════════════════════════════════
    // CONVERSIÓN
    // ═══════════════════════════════════════════════════════════════════
    function convertRow(row, modo) {
      if (modo === "usd") {
        const tc = MACRO[row.ym]?.blue || 1;
        return { ...row, ventas: row.ventas / tc, tarifa: (row.tarifa||0) / tc };
      }
      return { ...row };
    }
    function convertDs(data, modo) { return data.map(r => convertRow(r, modo)); }

    function inflEntreMeses(ymA, ymB) {
      const iA = MONTHS.indexOf(ymA), iB = MONTHS.indexOf(ymB);
      if (iA < 0 || iB < 0 || iB <= iA) return null;
      let f = 1;
      for (let i = iA + 1; i <= iB; i++) f *= (1 + MACRO[MONTHS[i]].ipc / 100);
      return (f - 1) * 100;
    }
    function varReal(nominal_pct, inflacion_pct) {
      if (nominal_pct == null || inflacion_pct == null) return null;
      return ((1 + nominal_pct/100) / (1 + inflacion_pct/100) - 1) * 100;
    }

    const shortLbl = ym => { const [y,m]=ym.split("-"); return `${ML[m]} ${y.slice(2)}`; };
    const getRow   = (data,ym) => data.find(d=>d.ym===ym) || null;
    const prevM    = ym => { const[y,m]=ym.split("-").map(Number); return m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,"0")}`; };
    const prevY    = ym => { const[y,m]=ym.split("-"); return `${Number(y)-1}-${m}`; };
    const pct      = (a,b) => b ? ((a-b)/b)*100 : null;
    const diffCol  = n => n==null||!isFinite(n)?"#94A3B8":n>=0?"#059669":"#DC2626";
    const diffBg   = n => n==null||!isFinite(n)?"#F1F5F9":n>=0?"#ECFDF5":"#FEF2F2";
    const arw      = n => n==null||!isFinite(n)?"":n>=0?"▲":"▼";

    function fmtV(n, modo) {
      if (n==null) return "—";
      if (modo==="usd") {
        if (Math.abs(n)>=1e6) return `U$S ${(n/1e6).toFixed(2)}M`;
        if (Math.abs(n)>=1e3) return `U$S ${(n/1e3).toFixed(1)}k`;
        return `U$S ${Math.round(n).toLocaleString("es-AR")}`;
      }
      if (Math.abs(n)>=1e9) return `$${(n/1e9).toFixed(2)}B`;
      if (Math.abs(n)>=1e6) return `$${(n/1e6).toFixed(1)}M`;
      if (Math.abs(n)>=1e3) return `$${(n/1e3).toFixed(1)}k`;
      return `$${Math.round(n).toLocaleString("es-AR")}`;
    }
    function fmtFull(n, modo) {
      if (n==null) return "—";
      if (modo==="usd") return `U$S ${Math.round(n).toLocaleString("es-AR")}`;
      return `$${Math.round(n).toLocaleString("es-AR")}`;
    }
    function fmtDiff(n, modo) {
      if (n==null) return "—";
      const s = n>=0?"+":"";
      if (modo==="usd") {
        if (Math.abs(n)>=1e3) return `${s}U$S ${Math.round(n/1e3).toLocaleString("es-AR")}k`;
        return `${s}U$S ${Math.round(n).toLocaleString("es-AR")}`;
      }
      if (Math.abs(n)>=1e6) return `${s}$${(n/1e6).toFixed(1)}M`;
      if (Math.abs(n)>=1e3) return `${s}$${Math.round(n/1e3).toLocaleString("es-AR")}k`;
      return `${s}$${Math.round(n).toLocaleString("es-AR")}`;
    }

    const fmtPctBadge = n => n==null||!isFinite(n)?"—":`${n>=0?"+":""}${n.toFixed(1)}%`;

      if (modo==="usd") return `U$S ${(v/1e3).toFixed(0)}k`;
      return `$${(v/1e6).toFixed(0)}M`;

      return (
        <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
          <span style={{ display:"inline-flex", alignItems:"center", gap:5,
            background:bgColor, border:`1px solid ${bdColor}`,
            borderRadius:20, padding:"4px 12px",
            fontSize:10, fontWeight:800, color:txColor, letterSpacing:"0.06em" }}>
            {icon} {label}
          </span>
          <span style={{ fontSize:11, color:C.muted }}>{ipcNote}</span>
        </div>
      );
    }

    function CompRow({ label, diff, nomPct, ymBase, ymTarget, modo, showReal, isMoney=true }) {
      const col=diffCol(nomPct), bg=diffBg(nomPct), ar=arw(nomPct);
      const inf  = showReal && ymBase && ymTarget ? inflEntreMeses(ymBase, ymTarget) : null;
      const real = inf!=null ? varReal(nomPct, inf) : null;
      const diffStr = typeof diff === "number"
        ? isMoney ? fmtDiff(diff, modo) : (diff>=0?"+":"")+Math.round(diff).toLocaleString("es-AR")
        : diff;
      return (
        <div style={{ background:bg, borderRadius:6, padding:"5px 8px", marginBottom:2 }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <span style={{ fontSize:9, color:C.muted, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.05em" }}>{label}</span>
            <span style={{ fontSize:11, fontWeight:700, color:col }}>
              {ar} {diffStr}{fmtPct(nomPct)}
            </span>
          </div>
          {real!=null && (
            <div style={{ display:"flex", justifyContent:"flex-end", marginTop:2 }}>
              <span style={{ fontSize:9, fontWeight:700,
                color:real>=0?C.realGreen:C.red,
                background:real>=0?"#D1FAE5":"#FEE2E2",
                borderRadius:4, padding:"1px 6px" }}>
                Var. real: {fmtPctBadge(real)}
              </span>
            </div>
          )}
        </div>
      );
    }

    function KpiCard({ label, icon, value, diffMes, pctMes, diffAnio, pctAnio, accent, modo, currentYm }) {
      const pYm  = prevM(currentYm);
      const pYYm = prevY(currentYm);
      const isMoney = label !== "Socios Activos";
      return (
        <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12,
          padding:"18px 20px", flex:1, minWidth:180, boxShadow:"0 1px 3px rgba(0,0,0,0.06)" }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
            <div style={{ width:30, height:30, borderRadius:8, background:`${accent||C.accent}18`,
              display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 }}>{icon}</div>
            <span style={{ fontSize:10, fontWeight:700, letterSpacing:"0.07em",
              color:C.sub, textTransform:"uppercase" }}>{label}</span>
          </div>
          <div style={{ fontSize:26, fontWeight:800, color:C.text,
            letterSpacing:"-0.03em", marginBottom:10 }}>{value}</div>
          <CompRow label="vs mes anterior" diff={diffMes}  nomPct={pctMes}
            ymBase={pYm}  ymTarget={currentYm} modo={modo}
            showReal={modo==="ars"&&isMoney} isMoney={isMoney} />
          <CompRow label="vs año anterior" diff={diffAnio} nomPct={pctAnio}
            ymBase={pYYm} ymTarget={currentYm} modo={modo}
            showReal={modo==="ars"&&isMoney} isMoney={isMoney} />
        </div>
      );
    }

    const ChartTip = ({ active, payload, label, barColor, modo }) => {
      if (!active||!payload?.length) return null;
      const ym = payload[0]?.payload?.ym;
      return (
        <div style={{ background:"#fff", border:`1px solid ${C.border}`, borderRadius:8,
          padding:"10px 14px", boxShadow:"0 4px 12px rgba(0,0,0,0.1)" }}>
          <div style={{ fontSize:11, color:C.muted, marginBottom:3 }}>{label}</div>
          <div style={{ fontSize:14, fontWeight:700, color:barColor||C.accent }}>
            {fmtFull(payload[0].value,modo)}
          </div>
          {modo==="usd"&&ym&&(
            <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>
              TC: ${MACRO[ym]?.blue?.toLocaleString("es-AR")}/USD
            </div>
          )}
        </div>
      );
    };

    function VentasChart({ data, barColor, currentYm, modo }) {
      const cd = data.map(d=>({ name:shortLbl(d.ym), ym:d.ym, ventas:Math.round(d.ventas) }));
      return (
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={cd} barSize={cd.length<=12?28:18}
            margin={{ top:4, right:4, bottom:0, left:0 }}>
            <CartesianGrid vertical={false} stroke={C.divider} />
            <XAxis dataKey="name"
              tick={{ fill:C.muted, fontSize:cd.length<=12?10:9 }}
              axisLine={false} tickLine={false} interval={0} />
            <YAxis tick={{ fill:C.muted, fontSize:10 }} axisLine={false} tickLine={false}
              tickFormatter={v=>fmtYAxis(v,modo)} width={60} />
            <Tooltip content={<ChartTip barColor={barColor} modo={modo} />}
              cursor={{ fill:"rgba(0,0,0,0.04)" }} />
            <Bar dataKey="ventas" radius={[4,4,0,0]}>
              {cd.map(d=>(
                <Cell key={d.ym}
                  fill={d.ym===currentYm?(barColor||C.accent):`${barColor||C.accent}55`} />
              ))}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      );
    }

    function TarifaChart({ con, sin, modo }) {
      const merged = con.map(r => {
        const s = sin.find(x=>x.ym===r.ym);
        return {
          name:shortLbl(r.ym), ym:r.ym,
          con:Math.round(r.tarifa||0),
          sin:s?Math.round(s.tarifa||0):null
        };
      });
      return (
        <ResponsiveContainer width="100%" height={190}>
          <LineChart data={merged} margin={{ top:4, right:16, bottom:0, left:0 }}>
            <CartesianGrid vertical={false} stroke={C.divider} />
            <XAxis dataKey="name" tick={{ fill:C.muted, fontSize:9 }}
              axisLine={false} tickLine={false} interval={0} />
            <YAxis tick={{ fill:C.muted, fontSize:10 }} axisLine={false} tickLine={false}
              tickFormatter={v=>modo==="usd"?`U$S ${Math.round(v/1e3)}k`:`$${Math.round(v/1e3)}k`}
              width={60} />
            <Tooltip
              formatter={(v,n)=>[fmtFull(v,modo),n==="con"?"Con alquileres/prod.":"Sin alquileres/prod."]}
              contentStyle={{ border:`1px solid ${C.border}`,borderRadius:8,fontSize:12 }} />
            <Legend formatter={n=>n==="con"?"Con alquileres":"Sin alq. + prod."}
              wrapperStyle={{ fontSize:11 }} />
            <Line type="monotone" dataKey="con" stroke={C.accent} strokeWidth={2.5} dot={false} />
            <Line type="monotone" dataKey="sin" stroke={C.amber}  strokeWidth={2.5} dot={false}
              strokeDasharray="5 3" />
          </LineChart>
        </ResponsiveContainer>
      );
    }

    function ComposicionChart({ modo }) {
      const data = RAW.con_alq.map(d => {
        const safe = (ds,ym) => getRow(ds,ym) || {ventas:0,ym,tarifa:0};
        const c = r => convertRow(r, modo);
        return {
          name:shortLbl(d.ym), ym:d.ym,
          pileta:   Math.round(c(safe(RAW.pileta,              d.ym)).ventas),
          gym:      Math.round(c(safe(RAW.gym_fitness,         d.ym)).ventas),
          colonia:  Math.round(c(safe(RAW.colonia,             d.ym)).ventas),
          escuelas: Math.round(c(safe(RAW.escuelas_deportivas, d.ym)).ventas),
        };
      });
      return (
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={data} barSize={18} margin={{ top:4, right:4, bottom:0, left:0 }}>
            <CartesianGrid vertical={false} stroke={C.divider} />
            <XAxis dataKey="name" tick={{ fill:C.muted, fontSize:9 }}
              axisLine={false} tickLine={false} interval={0} />
            <YAxis tick={{ fill:C.muted, fontSize:10 }} axisLine={false} tickLine={false}
              tickFormatter={v=>fmtYAxis(v,modo)} width={60} />
            <Tooltip formatter={(v,n)=>[fmtFull(v,modo),RUBROS[n]?.label||n]}
              contentStyle={{ border:`1px solid ${C.border}`,borderRadius:8,fontSize:11 }} />
            <Legend formatter={n=>RUBROS[n]?.label||n} wrapperStyle={{ fontSize:11 }} />
            <Bar dataKey="pileta"   stackId="a" fill={RUBROS.pileta.color} />
            <Bar dataKey="gym"      stackId="a" fill={RUBROS.gym_fitness.color} />
            <Bar dataKey="colonia"  stackId="a" fill={RUBROS.colonia.color} />
            <Bar dataKey="escuelas" stackId="a" fill={RUBROS.escuelas_deportivas.color}
              radius={[4,4,0,0]} />
          </BarChart>
        </ResponsiveContainer>
      );
    }

    // AnalysisPanel — panel principal por dataset
    function AnalysisPanel({ rawData, currentYm, barColor, chartRange, onChartRangeChange, modo }) {
      const data   = useMemo(()=>convertDs(rawData,modo),[rawData,modo]);
      const cur    = getRow(data, currentYm);
      const prev   = getRow(data, prevM(currentYm));
      const prevYr = getRow(data, prevY(currentYm));
      const col    = barColor||C.accent;
      const chartData = useMemo(()=>{
        const s=[...data].sort((a,b)=>a.ym.localeCompare(b.ym));
        return chartRange==="12"?s.slice(-12):s;
      },[data,chartRange]);

      if (!cur) return (
        <div style={{ textAlign:"center", padding:40, color:C.muted, fontSize:13,
          background:C.card, borderRadius:12, border:`1px solid ${C.border}` }}>
          Sin datos para el período seleccionado
        </div>
      );

      const kpis = [
        { label:"Ventas Netas", icon:"💰",
          value:fmtV(cur.ventas,modo),
          diffMes:prev?cur.ventas-prev.ventas:null,
          pctMes:prev?pct(cur.ventas,prev.ventas):null,
          diffAnio:prevYr?cur.ventas-prevYr.ventas:null,
          pctAnio:prevYr?pct(cur.ventas,prevYr.ventas):null },
        { label:"Socios Activos", icon:"👥",
          value:cur.socios.toLocaleString("es-AR"),
          diffMes:prev?cur.socios-prev.socios:null,
          pctMes:prev?pct(cur.socios,prev.socios):null,
          diffAnio:prevYr?cur.socios-prevYr.socios:null,
          pctAnio:prevYr?pct(cur.socios,prevYr.socios):null },
        { label:"Tarifa Promedio", icon:"📊",
          value:fmtV(cur.tarifa||0,modo),
          diffMes:prev?((cur.tarifa||0)-(prev.tarifa||0)):null,
          pctMes:prev&&prev.tarifa?pct(cur.tarifa||0,prev.tarifa):null,
          diffAnio:prevYr?((cur.tarifa||0)-(prevYr.tarifa||0)):null,
          pctAnio:prevYr&&prevYr.tarifa?pct(cur.tarifa||0,prevYr.tarifa):null },
      ];

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <ModoBanner modo={modo} currentYm={currentYm} />
          {modo==="ars" && (
            <div style={{ background:"#F0FDF4", border:"1px solid #BBF7D0",
              borderRadius:8, padding:"7px 13px", fontSize:11, color:C.realGreen }}>
              💡 <strong>Var. Real</strong> — cada KPI muestra la variación descontando la inflación INDEC del período
            </div>
          )}
          <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
            {kpis.map(k=>(
              <KpiCard key={k.label} {...k} accent={col} modo={modo} currentYm={currentYm} />
            ))}
          </div>
          <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12,
            padding:"18px 20px", boxShadow:"0 1px 3px rgba(0,0,0,0.06)" }}>
            <div style={{ display:"flex", justifyContent:"space-between",
              alignItems:"center", marginBottom:14 }}>
              <span style={{ fontSize:10, fontWeight:700, letterSpacing:"0.07em",
                color:C.sub, textTransform:"uppercase" }}>
                Ventas Netas Mensuales
              </span>
              <div style={{ display:"flex", gap:6 }}>
                {[["12","Últ. 12 meses"],["all","Desde Ene 2024"]].map(([v,lbl])=>(
                  <button key={v} onClick={()=>onChartRangeChange(v)} style={{
                    background: chartRange===v ? col : "transparent",
                    border: `1px solid ${chartRange===v ? col : C.border}`,
                    color: chartRange===v ? "#fff" : C.sub,
                    cursor:"pointer", fontSize:11, fontWeight:600,
                    padding:"4px 10px", borderRadius:6,
                  }}>{lbl}</button>
                ))}
              </div>
            </div>
            <VentasChart data={chartData} barColor={col} currentYm={currentYm} modo={modo} />
          </div>
        </div>
      );
    }

    // Panel YTD
    function YTDPanel({ currentYm, modo }) {
      const [y,m] = currentYm.split("-").map(Number);
      const months     = Array.from({length:m},(_,i)=>`${y}-${String(i+1).padStart(2,"0")}`);
      const prevMonths = months.map(ym=>prevY(ym));

      const sum = (ds, yms) =>
        yms.reduce((acc,ym)=>{ const r=getRow(convertDs(ds,modo),ym); return acc+(r?.ventas||0); },0);

      const ytdCur  = sum(RAW.con_alq, months);
      const ytdPrev = sum(RAW.con_alq, prevMonths);
      const ytdPct  = pct(ytdCur, ytdPrev);
      const ytdDiff = ytdCur - ytdPrev;
      const infYTD  = inflEntreMeses(`${y-1}-${String(m).padStart(2,"0")}`, currentYm);
      const ytdReal = varReal(ytdPct, infYTD);

      return (
        <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12,
          padding:"18px 20px", marginTop:20, boxShadow:"0 1px 3px rgba(0,0,0,0.06)" }}>
          <div style={{ marginBottom:14 }}>
            <span style={{ fontSize:10, fontWeight:700, letterSpacing:"0.07em",
              color:C.sub, textTransform:"uppercase" }}>
              Acumulado YTD {y}
            </span>
            <span style={{ fontSize:10, color:C.muted, marginLeft:8 }}>
              Ene–{shortLbl(currentYm)} vs mismo período {y-1} · Total con alquileres
            </span>
          </div>
          <div style={{ display:"flex", gap:24, flexWrap:"wrap", alignItems:"center" }}>
            <div>
              <div style={{ fontSize:11, color:C.muted, marginBottom:4 }}>YTD {y}</div>
              <div style={{ fontSize:28, fontWeight:800, color:C.text }}>{fmtV(ytdCur,modo)}</div>
            </div>
            <div style={{ fontSize:22, color:C.muted }}>vs</div>
            <div>
              <div style={{ fontSize:11, color:C.muted, marginBottom:4 }}>YTD {y-1}</div>
              <div style={{ fontSize:28, fontWeight:800, color:C.text }}>{fmtV(ytdPrev,modo)}</div>
            </div>
            <div style={{ flex:1, minWidth:220 }}>
              <div style={{ background:diffBg(ytdPct), borderRadius:10, padding:"12px 16px" }}>
                <div style={{ fontSize:20, fontWeight:800, color:diffCol(ytdPct) }}>
                  {arw(ytdPct)} {fmtDiff(ytdDiff,modo)}{fmtPct(ytdPct)}
                </div>
                {modo==="ars" && ytdReal!=null && (
                  <div style={{ fontSize:11, color:C.realGreen, marginTop:4, fontWeight:700 }}>
                    Var. real: {fmtPctBadge(ytdReal)} · Infl. período: {fmtPctBadge(infYTD)}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // DASHBOARD PRINCIPAL
    // ═══════════════════════════════════════════════════════════════════
    function Dashboard() {
      const [modo,       setModo]       = useState("ars");
      const [currentYm,  setCurrentYm]  = useState("2026-05");
      const [chartRange, setChartRange] = useState("12");
      const [activeTab,  setActiveTab]  = useState("con_alq");

      const TABS = [
        { key:"con_alq",             label:"Total",          rawData:RAW.con_alq,             barColor:C.accent },
        { key:"sin_alq",             label:"Sin alq.",        rawData:RAW.sin_alq,             barColor:C.teal   },
        { key:"pileta",              label:"Pileta",          rawData:RAW.pileta,              barColor:RUBROS.pileta.color },
        { key:"gym_fitness",         label:"Gym & Fitness",   rawData:RAW.gym_fitness,         barColor:RUBROS.gym_fitness.color },
        { key:"membresias",          label:"Membresías",      rawData:RAW.membresias,          barColor:RUBROS.membresias.color },
        { key:"escuelas_deportivas", label:"Escuelas Dep.",   rawData:RAW.escuelas_deportivas, barColor:RUBROS.escuelas_deportivas.color },
        { key:"colonia",             label:"Colonia",         rawData:RAW.colonia,             barColor:RUBROS.colonia.color },
        { key:"alquileres",          label:"Alquileres",      rawData:RAW.alquileres,          barColor:C.amber  },
      ];

      const tab = TABS.find(t=>t.key===activeTab) || TABS[0];

      const ymOptions = useMemo(()=>
        [...RAW.con_alq].map(r=>r.ym).sort().reverse()
      ,[]);

      return (
        <div style={{ background:C.bg, minHeight:"100vh", paddingBottom:40 }}>

          {/* HEADER */}
          <div style={{
            background:"linear-gradient(135deg, #0369A1 0%, #0284C7 60%, #0EA5E9 100%)",
            padding:"18px 24px",
            boxShadow:"0 2px 8px rgba(3,105,161,0.2)",
          }}>
            <div style={{ maxWidth:1200, margin:"0 auto",
              display:"flex", alignItems:"center", justifyContent:"space-between",
              flexWrap:"wrap", gap:12 }}>
              {/* Logo + título */}
              <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                <div style={{ width:44, height:44, borderRadius:12,
                  background:"rgba(255,255,255,0.18)", display:"flex",
                  alignItems:"center", justifyContent:"center", fontSize:26 }}>
                  🏊
                </div>
                <div>
                  <div style={{ fontSize:20, fontWeight:800, color:"#fff", letterSpacing:"-0.02em" }}>
                    Splash Fit
                  </div>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,0.75)", fontWeight:500 }}>
                    Dashboard Financiero · Centro Deportivo
                  </div>
                </div>
              </div>
              {/* Controles */}
              <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                <ModoSelector modo={modo} onChange={setModo} />
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:10, fontWeight:700, color:"rgba(255,255,255,0.7)",
                    textTransform:"uppercase", letterSpacing:"0.07em" }}>Mes</span>
                  <select value={currentYm} onChange={e=>setCurrentYm(e.target.value)} style={{
                    background:"rgba(255,255,255,0.15)",
                    border:"1px solid rgba(255,255,255,0.3)",
                    color:"#fff", borderRadius:7, padding:"5px 10px",
                    fontSize:12, fontWeight:700, cursor:"pointer",
                  }}>
                    {ymOptions.map(ym=>(
                      <option key={ym} value={ym}
                        style={{ color:C.text, background:"#fff" }}>
                        {shortLbl(ym)}
                      </option>
                    ))}
                  </select>
                </div>
              </div>
            </div>
          </div>

          {/* CONTENIDO */}
          <div style={{ maxWidth:1200, margin:"0 auto", padding:"24px 20px 0" }}>

            {/* TABS */}
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:20,
              borderBottom:`2px solid ${C.border}`, paddingBottom:12 }}>
              {TABS.map(t=>{
                const sel = t.key===activeTab;
                return (
                  <button key={t.key} onClick={()=>setActiveTab(t.key)} style={{
                    background: sel ? t.barColor : "transparent",
                    border: `1px solid ${sel ? t.barColor : C.border}`,
                    color: sel ? "#fff" : C.sub,
                    borderRadius:8, padding:"6px 14px", fontSize:12,
                    fontWeight:700, cursor:"pointer",
                  }}>{t.label}</button>
                );
              })}
            </div>

            {/* PANEL PRINCIPAL */}
            <AnalysisPanel
              rawData={tab.rawData}
              currentYm={currentYm}
              barColor={tab.barColor}
              chartRange={chartRange}
              onChartRangeChange={setChartRange}
              modo={modo}
            />

            {/* YTD */}
            <YTDPanel currentYm={currentYm} modo={modo} />

            {/* TARIFA PROMEDIO */}
            <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12,
              padding:"18px 20px", marginTop:20,
              boxShadow:"0 1px 3px rgba(0,0,0,0.06)" }}>
              <div style={{ marginBottom:12 }}>
                <span style={{ fontSize:10, fontWeight:700, letterSpacing:"0.07em",
                  color:C.sub, textTransform:"uppercase" }}>
                  Evolución de Tarifa Promedio
                </span>
                <span style={{ fontSize:10, color:C.muted, marginLeft:8 }}>
                  con alquileres vs. sin alquileres + prod.
                </span>
              </div>
              <TarifaChart
                con={convertDs(RAW.con_alq, modo)}
                sin={convertDs(RAW.sin_alq,  modo)}
                modo={modo}
              />
            </div>

            {/* COMPOSICIÓN */}
            <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12,
              padding:"18px 20px", marginTop:20,
              boxShadow:"0 1px 3px rgba(0,0,0,0.06)" }}>
              <div style={{ marginBottom:12 }}>
                <span style={{ fontSize:10, fontWeight:700, letterSpacing:"0.07em",
                  color:C.sub, textTransform:"uppercase" }}>
                  Composición de Ingresos por Rubro
                </span>
                <span style={{ fontSize:10, color:C.muted, marginLeft:8 }}>
                  apilado mensual
                </span>
              </div>
              <ComposicionChart modo={modo} />
            </div>

            {/* FOOTER */}
            <div style={{ textAlign:"center", marginTop:32,
              fontSize:11, color:C.muted,
              paddingTop:20, borderTop:`1px solid ${C.divider}` }}>
              Splash Fit · Dashboard Financiero · Datos a May-2026 ·
              Inflación acum. Ene-2025 → May-2026: {INF_TOTAL_PCT}%
            </div>

          </div>
        </div>
      );
    }

    // ── RENDER ──────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
